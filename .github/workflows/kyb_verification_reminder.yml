name: KYB Verification Reminder

on:
  pull_request_review:
    types: [submitted]

jobs:
  kyb_reminder:
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved' && needs['check_for_approvals'].outcome == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for existing comment
        id: check_for_approvals
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const kyCommentExists = comments.data.some(comment => comment.body.includes('To complete the process, please verify your organization\'s information'));

            if (kyCommentExists) {
                return 'failure'; // Fail the check if comment exists
            } else {
                return 'success'; // Continue if comment does not exist
            }

      - name: Get PR author
        id: pr_author
        uses: actions/github-script@v6
        with:
          script: |
            return context.payload.pull_request.user.login

      - name: Post comment
        if: steps.pr_author?.outputs?.result # Conditional execution of the step
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const author = steps.pr_author?.outputs?.result; // Optional chaining (for safety)
            const sumsubLink = 'YOUR_STATIC_SUMSUB_LINK_HERE'; // **REPLACE WITH YOUR ACTUAL LINK**

            const message = `👋 Hi @${author}, thanks for submitting your application!

            To complete the process, please verify your organization's information using our KYB/KYC provider, SumSub.  You can access the verification form here: [${sumsubLink}](${sumsubLink})

            Please complete this step as soon as possible.  If you have any questions, please don't hesitate to ask.`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
